<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 12px;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      margin-top: 8px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
      margin-top: 2px;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #status {
      margin-top: 8px;
      color: #2f9e44;
      min-height: 1em;
    }
    #empty {
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Mixhoster Recovery Helper</h1>
  <div id="empty">No .m3u8 request captured on this tab yet. Play the mix, then reopen this popup.</div>
  <div id="form" style="display: none">
    <label for="url">Captured stream URL</label>
    <select id="url"></select>

    <label for="slug">Slug</label>
    <input id="slug" type="text" />

    <label for="title">Title</label>
    <input id="title" type="text" />

    <label for="date">Date</label>
    <input id="date" type="date" />

    <button id="launch">Launch remux</button>
    <button id="copy">Copy recover-mix.sh command</button>
    <button id="copyUrl">Copy URL only</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
